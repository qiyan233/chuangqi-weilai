server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:startup.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

# JWT 配置
jwt:
  secret: startup-incubator-secret-key-2026-very-long-secret
  expiration: 86400000  # 24小时

# 文件上传路径
upload:
  dir: ./uploads
