server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:startup.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

# JWT 配置
jwt:
  # 生产环境必须通过环境变量 JWT_SECRET 设置密钥
  # 当前为开发默认值，生产环境务必替换
  secret: ${JWT_SECRET:dev-only-please-set-JWT_SECRET-env-var-in-production-2026}
  expiration: 86400000  # 24小时

# 文件上传路径
upload:
  dir: ./uploads
